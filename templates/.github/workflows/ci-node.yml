name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "{{NODE_VERSION}}"

      - name: Install dependencies
        run: npm install

{{CI_GATE_STEP}}
      - name: Run test suite
        run: |
          {{CI_VALIDATE_COMMAND}}
