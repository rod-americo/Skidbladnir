name: CI

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify syntax
        run: python3 -m py_compile scaffold_project.py run_regression_suite.py bin/newproj

      - name: Run regression suite
        run: python3 run_regression_suite.py
